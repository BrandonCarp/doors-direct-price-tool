<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doors Direct — Sign in</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--maroon:#500609;--maroon-2:#73121a;--accent:#8a1a23}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100%;display:flex;flex-direction:column;
    background:radial-gradient(1200px 600px at 80% -10%,#7a1620 0%,rgba(122,22,32,0) 60%),
               linear-gradient(135deg,#2e0205 0%,#500609 45%,#73121a 100%);
    color:#fff;position:relative;overflow:hidden}
  /* faint watermark logo */
  .topbar{padding:26px 30px;position:relative;z-index:2}
  .topbar img{height:34px;opacity:.92}
  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:2}
  .card{width:100%;max-width:430px;background:#fff;color:#1c1f23;border-radius:16px;
    box-shadow:0 24px 60px rgba(0,0,0,.35);padding:38px 38px 30px}
  .card .logo{display:block;height:46px;margin:0 auto 22px}
  h1{font-size:23px;font-weight:700;color:#2a2d31;margin-bottom:24px;text-align:center;letter-spacing:-.2px}
  label{display:block;font-size:13px;font-weight:600;color:#43484e;margin:0 0 7px 2px}
  .field{margin-bottom:16px}
  input{width:100%;height:50px;border:1.5px solid #d7dbe0;border-radius:10px;padding:0 14px;font-size:16px;
    background:#fff;transition:border-color .15s,box-shadow .15s;outline:none}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(138,26,35,.13)}
  .btn{width:100%;height:52px;border:0;border-radius:10px;margin-top:6px;
    background:linear-gradient(180deg,#8a1a23,#6a1019);color:#fff;font-size:15px;font-weight:700;letter-spacing:.6px;
    text-transform:uppercase;cursor:pointer;transition:filter .15s}
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.6;cursor:default}
  .err{display:none;background:#fdeaea;border:1px solid #f3c2c2;color:#9b1c1c;font-size:13px;
    padding:10px 12px;border-radius:9px;margin-bottom:16px}
  .err.show{display:block}
  .foot{margin-top:22px;text-align:center;font-size:12px;color:#9aa0a6}
  .hint{margin-top:14px;text-align:center;font-size:12.5px;color:#8a9097}
</style></head>

      <h1>Sign in to your account</h1>
      <div class="err" id="err">Incorrect username or password.</div>
      <div class="field"><label for="u">Username</label>
        <input id="u" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" autofocus></div>
      <div class="field"><label for="p">Password</label>
        <input id="p" type="password" autocomplete="current-password"></div>
      <button class="btn" id="go" onclick="login()">Sign in</button>
      <div class="hint">Internal pricing tool · authorized staff only</div>
      <div class="foot">© Doors Direct</div>
    </div>
  </div>
<script>
  var U=document.getElementById('u'),P=document.getElementById('p'),E=document.getElementById('err'),B=document.getElementById('go');
  function login(){
    E.classList.remove('show'); B.disabled=true; B.textContent='Signing in…';
    fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:U.value,password:P.value})})
    .then(function(r){return r.ok;})
    .then(function(ok){
      if(ok){ window.location.href='/'; }
      else { E.classList.add('show'); B.disabled=false; B.textContent='Sign in'; P.value=''; P.focus(); }
    })
    .catch(function(){ E.classList.add('show'); B.disabled=false; B.textContent='Sign in'; });
  }
  [U,P].forEach(function(el){el.addEventListener('keydown',function(e){if(e.key==='Enter')login();});});
</script>
